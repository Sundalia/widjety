<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>widJety-box</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
        <div class="sub_parent">
            <div class="take_out" id="take_out"></div>
            <canvas id="jetty_canvas" class="jetty_canvas"></canvas>
        </div>

        <dialog id="dialog" class="dialog">
            <div class="form">
                <h1>Один шаг - и подарок Ваш!</h1>
                <input  id="input" class="input" placeholder="Введите номер телефона">
                <button id="submit" class="submit">Получить подарок</button>
                <img class="logo" src="assets/logoJB.svg"/>
            </div>
        </dialog>
        <dialog id="success" class="success">
            <div class="form">
                <h1>Спаибо за желание быть счастливым!</h1>
                <h4>Мы свяжемся с вами в течение часа</h4>
                <img class="logo" src="assets/logoJB.svg"/>
            </div>
        </dialog>
    <script type="module" src="main.js"></script>
</body>
</html>
