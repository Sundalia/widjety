<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>widJety-box</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="parent_canvas">
        <div class="sub_parent">
            <div class="take_out" id="take_out"></div>
            <canvas id="jetty_canvas" class="jetty_canvas"></canvas>
        </div>

        <dialog id="dialog" class="dialog">
            <form class="form">
                    <input class="input" placeholder="Имя">
                    <input class="input" placeholder="Тел">
                    <input class="input" placeholder="E-mail">
                    <label>Что вас больше всего заинтересовало?</label>
                    <select class="input">
                        <option class="input">SEO</option>
                        <option class="input">3D</option>
                        <option>CRM</option>
                        <option>API-телефония</option>
                    </select>
                <button id="submit" class="submit">CLOSE</button>
            </form>
        </dialog>
    </div>
    <script type="module" src="/main.js"></script>
</body>
</html>
