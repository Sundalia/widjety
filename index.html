<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>widJety-box</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
        <div class="sub_parent">
            <div class="take_out" id="take_out"></div>
            <canvas id="jetty_canvas" class="jetty_canvas"></canvas>
        </div>

        <dialog id="dialog" class="dialog">
            <div class="form">
                <div class="close_popup">
                    <button id="close_popup_btn" class="close_popup_btn"><i class="fa fa-close"></i></button>
                </div>
                <h2>Один шаг - и подарок Ваш!</h2>
                <input  id="input" class="input" placeholder="Введите номер телефона">
                <button id="submit" class="submit">Получить подарок</button>
                <img class="logo" src="assets/logoJB.svg"/>
            </div>
        </dialog>
        <dialog id="success" class="success">
            <div class="form">
                <div class="close_popup">
                    <button id="close_success_btn" class="close_popup_btn"><i class="fa fa-close"></i></button>
                </div>
                <h2>Спаибо за желание быть счастливыми!</h2>
                <h4>Мы свяжемся с вами в течение получаса</h4>
                <img class="logo" src="assets/logoJB.svg"/>
            </div>
        </dialog>
    <script type="module" src="main.js"></script>
</body>
</html>
